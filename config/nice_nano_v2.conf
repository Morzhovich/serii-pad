# Имя устройства (попробуй кириллицу, если упадет - смени на RhinoPad)
CONFIG_ZMK_KEYBOARD_NAME="RhinoPAD_Blya"



CONFIG_ZMK_SLEEP=y
# В этом режиме макропад просыпается мгновенно
CONFIG_ZMK_IDLE_TIMEOUT=300000
# 2. Глубокий сон (Deep Sleep) - через 1 час (60 * 60 * 1000 мс)
# Полное отключение питания для экономии 120mAh
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Ограничиваем время видимости в поиске (60 секунд)
# Если за минуту не подключился — радио выключается
CONFIG_BT_LIM_ADV_TIMEOUT=60

# Мощность сигнала (0 - стандарт, бережет батарею 120mAh)
CONFIG_BT_CTLR_TX_PWR_0=y

# Если комбо все равно срабатывает плохо, можно попробовать включить это:
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Передача заряда батареи
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
